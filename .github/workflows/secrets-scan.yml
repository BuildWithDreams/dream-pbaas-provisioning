name: Secrets Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked private IPs
        run: |
          set -u
          echo "Scanning for leaked private IPs and key paths in this push..."

          # Block common cloud provider private ranges and known hosting ranges
          PRIVATE_IP_BLOCKS="10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|135\.181\.|46\.250\.|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}"

          HEAD_SHA="$GITHUB_SHA"
          BEFORE_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"
          FOUND=0

          # For first-push branches, github.event.before = 0000... — use git diff --root.
          # Otherwise use before^..HEAD revision range.
          IP_TMP=$(mktemp)
          KEY_TMP=$(mktemp)
          if [ "$BEFORE_SHA" = "$ZERO_SHA" ]; then
            echo "First push (github.event.before = 0000...), scanning new commit content."
            git diff --root HEAD | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS" > "$IP_TMP" || true
            git diff --root HEAD | grep "^[[:space:]]*+[^+]" | grep -iE "\.ssh/id_[a-z]+$" | grep -v "\.pub$" > "$KEY_TMP" || true
          else
            git diff "${BEFORE_SHA}^..HEAD" | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS" > "$IP_TMP" || true
            git diff "${BEFORE_SHA}^..HEAD" | grep "^[[:space:]]*+[^+]" | grep -iE "\.ssh/id_[a-z]+$" | grep -v "\.pub$" > "$KEY_TMP" || true
          fi

          if [ -s "$IP_TMP" ]; then
            while IFS= read -r line; do echo "❌ Leaked private IP: $line"; FOUND=1; done < "$IP_TMP"
          fi
          if [ -s "$KEY_TMP" ]; then
            while IFS= read -r line; do echo "❌ Private key path: $line"; FOUND=1; done < "$KEY_TMP"
          fi
          rm -f "$IP_TMP" "$KEY_TMP"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "💡 Move secrets to group_vars/production-local.yml (gitignored)"
            exit 1
          fi

          echo "✅ No private IPs or key paths detected"
