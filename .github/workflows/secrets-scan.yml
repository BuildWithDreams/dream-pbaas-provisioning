name: Secrets Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked private IPs
        run: |
          set -euo pipefail
          echo "Scanning for leaked private IPs and key paths in this push..."

          # Block common cloud provider private ranges and known hosting ranges
          PRIVATE_IP_BLOCKS="(10\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}|135\\.181\\.|46\\.250\\.|192\\.168\\.[0-9]{1,3}\\.[0-9]{1,3}|172\\.(1[6-9]|2[0-9]|3[0-1])\\.[0-9]{1,3}\\.[0-9]{1,3})"

          HEAD_SHA="$GITHUB_SHA"
          BEFORE_SHA="${{ github.event.before }}"

          # For first-push branches (including new branch pushes), the before SHA
          # is all-zeroes — use git diff --root to compare the empty tree to HEAD.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ "$BEFORE_SHA" == "$ZERO_SHA" ]]; then
            echo "First push (github.event.before = 0000...), scanning new commit content."
            # git diff --root treats the empty tree as the starting point,
            # capturing all files added in the initial commit(s).
            SCAN_RANGE="--root HEAD"
          else
            SCAN_RANGE="${BEFORE_SHA}^..HEAD"
          fi

          FOUND=0

          # Scan diff additions for private IPs (skip the diff/++ header lines)
          while IFS= read -r line; do
            echo "❌ Leaked private IP: $line"
            FOUND=1
          done < <(git diff "$SCAN_RANGE" | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS")

          # Block private key file references — scan additions only
          while IFS= read -r line; do
            echo "❌ Private key path: $line"
            FOUND=1
          done < <(git diff "$SCAN_RANGE" | grep "^[[:space:]]*+[^+]" | grep -iE "~/\\.ssh/(?!config|ssh_config)[^ '\"\\"]*id_[^(pub)]")

          if [[ $FOUND -eq 1 ]]; then
            echo ""
            echo "💡 Move secrets to group_vars/production-local.yml (gitignored)"
            exit 1
          fi

          echo "✅ No private IPs or key paths detected"
