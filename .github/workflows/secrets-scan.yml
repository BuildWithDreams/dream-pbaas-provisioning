name: Secrets Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked private IPs
        run: |
          echo "Scanning for leaked private IPs and key paths in this push..."
          
          # Block common cloud provider private ranges and known hosting ranges
          PRIVATE_IP_BLOCKS="(10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|\
135\.181\.|\
46\.250\.|\
192\.168\.[0-9]{1,3}\.[0-9]{1,3}|\
172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3})"
          
          # Use GitHub event payload — authoritative source for what was pushed.
          # github.event.before = SHA before this push (000000... for new/first-push branches).
          HEAD_SHA="$GITHUB_SHA"
          BEFORE_SHA="${{ github.event.before }}"
          
          # For new branches (first push), github.event.before = 0000... — git diff handles this fine.
          # grep ^[+][^+] skips diff headers (+++ b/path) and only matches actual added content lines.
          FOUND=0
          while IFS= read -r line; do
            echo "❌ Leaked private IP: $line"
            FOUND=1
          done < <(git diff "$BEFORE_SHA" "$HEAD_SHA" | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS")

          # Block private key file references — scan additions only
          while IFS= read -r line; do
            echo "❌ Private key path: $line"
            FOUND=1
          done < <(git diff "$BEFORE_SHA" "$HEAD_SHA" | grep "^[[:space:]]*+[^+]" | grep -iE "~/\\.ssh/(?!config|ssh_config)[^ '\"\"]*id_[^(pub)]")

          if [[ $FOUND -eq 1 ]]; then
            echo ""
            echo "💡 Move secrets to group_vars/production-local.yml (gitignored)"
            exit 1
          fi
          
          echo "✅ No private IPs or key paths detected"
