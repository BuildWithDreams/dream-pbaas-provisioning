name: Secrets Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked private IPs
        run: |
          echo "Scanning for private IP addresses..."
          
          # Block common cloud provider private ranges and known hosting ranges
          PRIVATE_IP_BLOCKS="(10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|\
135\.181\.|\
46\.250\.|\
192\.168\.[0-9]{1,3}\.[0-9]{1,3}|\
172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3})"
          
          # Get the actual commits in this push — compare against the parent of the head commit
          HEAD_SHA="$(git rev-parse HEAD)"
          # Handle initial commit (no parent) — compare against empty tree to scan all new files
          if git rev-parse HEAD^ &>/dev/null; then
            PARENT_SHA="$(git rev-parse HEAD^)"
          else
            PARENT_SHA="$(git mktree </dev/null)"  # empty tree SHA
          fi
          
          FOUND=0
          # Only scan NEW content — additions only (not diff header lines).
          # Diff header '+++ b/path' starts at column 1; actual added content starts '+ '.
          while IFS= read -r line; do
            echo "❌ Leaked private IP: $line"
            FOUND=1
          done < <(git diff "$PARENT_SHA" "$HEAD_SHA" | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS")

          # Block private key file references — scan additions only
          while IFS= read -r line; do
            echo "❌ Private key path: $line"
            FOUND=1
          done < <(git diff "$PARENT_SHA" "$HEAD_SHA" | grep "^[[:space:]]*+[^+]" | grep -iE "~/\\.ssh/(?!config|ssh_config)[^ '\"\"]*id_[^(pub)]")

          if [[ $FOUND -eq 1 ]]; then
            echo ""
            echo "💡 Move secrets to group_vars/production-local.yml (gitignored)"
            exit 1
          fi
          
          echo "✅ No private IPs or key paths detected"
