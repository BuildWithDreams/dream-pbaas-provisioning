name: Secrets Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked private IPs
        run: |
          set -u
          echo "Scanning for leaked private IPs and key paths in this push..."

          # Block common cloud provider private ranges and known hosting ranges
          PRIVATE_IP_BLOCKS="10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|135\.181\.|46\.250\.|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}"

          HEAD_SHA="$GITHUB_SHA"
          BEFORE_SHA="${{ github.event.before }}"

          # For first-push branches, github.event.before = 0000... — use git diff --root.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$ZERO_SHA" ]; then
            echo "First push (github.event.before = 0000...), scanning new commit content."
            SCAN_RANGE="--root HEAD"
          else
            SCAN_RANGE="${BEFORE_SHA}^..HEAD"
          fi

          FOUND=0

          # Scan diff additions for private IPs
          # Note: avoid mktemp (not available in dash on GitHub runners)
          TMPFILE="/tmp/scan_$$"
          git diff "$SCAN_RANGE" | grep "^[[:space:]]*+[^+]" | grep -iE "$PRIVATE_IP_BLOCKS" > "$TMPFILE" || true
          if [ -s "$TMPFILE" ]; then
            while IFS= read -r line; do echo "❌ Leaked private IP: $line"; FOUND=1; done < "$TMPFILE"
          fi
          rm -f "$TMPFILE"

          # Block private key file references (exclude .pub and config/ssh_config)
          TMPFILE2="/tmp/scan2_$$"
          git diff "$SCAN_RANGE" | grep "^[[:space:]]*+[^+]" | grep -iE "\.ssh/id_[a-z]+$" | grep -v "\.pub$" > "$TMPFILE2" || true
          if [ -s "$TMPFILE2" ]; then
            while IFS= read -r line; do echo "❌ Private key path: $line"; FOUND=1; done < "$TMPFILE2"
          fi
          rm -f "$TMPFILE2"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "💡 Move secrets to group_vars/production-local.yml (gitignored)"
            exit 1
          fi

          echo "✅ No private IPs or key paths detected"
