# Playbook: 24-rpc-server-verify.yml
# Purpose: Run a local curl on the remote host to check the RPC server getinfo response.
#          Pulls credentials directly from the VRSC daemon conf — no Conf.toml needed.
# Run with: ansible-playbook -i inventory.ini playbooks/24-rpc-server-verify.yml
# Prereq:   VRSC daemon must be running and the RPC server container must be up.

---
- name: Verify RPC server getinfo via curl
  hosts: production
  become: false
  vars:
    rpc_port: "37486"
    rpc_url: "http://localhost:{{ rpc_port }}/api/getinfo"
    vrsc_conf: "/home/{{ ansible_user }}/docker-verusd/mainnet/data_dir/VRSC/VRSC.conf"

  tasks:
    # ── 1. Read credentials from VRSC.conf ─────────────────────────────────────
    - name: Extract rpcuser from VRSC.conf
      ansible.builtin.shell:
        cmd: "python3 -c \"
import re, sys
c = open('{{ vrsc_conf }}').read()
u = re.search(r'^rpcuser=(.*)', c, re.MULTILINE)
p = re.search(r'^rpcpassword=(.*)', c, re.MULTILINE)
if u and p:
    print(u.group(1).strip())
else:
    sys.exit(1)
\""
      register: rpc_user
      changed_when: false
      failed_when: false

    - name: Extract rpcpassword from VRSC.conf
      ansible.builtin.shell:
        cmd: "python3 -c \"
import re, sys
c = open('{{ vrsc_conf }}').read()
p = re.search(r'^rpcpassword=(.*)', c, re.MULTILINE)
if p:
    print(p.group(1).strip())
else:
    sys.exit(1)
\""
      register: rpc_pass
      changed_when: false
      failed_when: false

    - name: Fail if credentials not found
      ansible.builtin.fail:
        msg: "Could not read rpcuser/rpcpassword from {{ vrsc_conf }}"
      when: rpc_user.rc != 0 or rpc_pass.rc != 0

    # ── 2. Curl getinfo ─────────────────────────────────────────────────────────
    - name: Curl getinfo
      ansible.builtin.shell:
        cmd: "curl -s -f -u '{{ rpc_user.stdout }}:{{ rpc_pass.stdout }}' '{{ rpc_url }}'"
        timeout: 15
      register: getinfo_result
      changed_when: false
      failed_when: false

    - name: Display raw response
      ansible.builtin.debug:
        msg: "{{ getinfo_result.stdout }}"

    # ── 3. Parse and display key fields ────────────────────────────────────────
    - name: Parse getinfo JSON
      ansible.builtin.set_fact:
        info: "{{ getinfo_result.stdout | from_json }}"
      when: getinfo_result.rc == 0 and getinfo_result.stdout | length > 0

    - name: Display parsed result
      ansible.builtin.debug:
        msg: |
          status  → {{ 'OK' if getinfo_result.rc == 0 else 'FAIL' }}
          version → {{ info.version | default('N/A') }}
          blocks  → {{ info.blocks | default('N/A') }}
          balance → {{ info.balance | default(info.money_supply | default('N/A')) }}
          chain   → {{ info.chain | default('N/A') }}
      when: info is defined

    # ── 4. Assert health ────────────────────────────────────────────────────────
    - name: Assert blocks field is present
      ansible.builtin.assert:
        that:
          - "getinfo_result.rc == 0"
          - "getinfo_result.stdout | length > 0"
          - "info.blocks is defined"
          - "info.blocks | int >= 0"
        fail_msg: "getinfo check failed — RPC server may be unreachable or daemon is down"
        success_msg: "RPC server is healthy — getinfo returned valid response"
      when: info is defined
