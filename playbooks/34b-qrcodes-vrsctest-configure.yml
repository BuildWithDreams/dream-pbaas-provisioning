# Playbook: 34b-qrcodes-vrsctest-configure.yml
# Purpose: Write config.js for the qrcodes app from VRSCTEST RPC credentials.
#          Must run BEFORE 35-qrcodes-build.yml — config.js is baked into the image.
#          SERVICE_SIGNER_IADDRESS is read from inventory/group_vars/production.yml.
#          SERVICE_SIGNER_WIF is read from ~/.bwd_signer_wif (written by playbook 49).
#          Run playbook 49 first to fetch the WIF before running this step.
# Run with: ansible-playbook -i inventory.ini playbooks/34b-qrcodes-vrsctest-configure.yml
# Requires: 34-qrcodes-vrsctest-clone.yml (repo must be cloned)
# Idempotent: safe to re-run — overwrites config.js each time.
---
- name: Configure qrcodes app for VRSCTEST
  hosts: production
  become: false
  vars:
    qr_repo_dest: "verus-identity-update-qr-creator-main"
    qr_path: "/home/{{ ansible_user }}/{{ qr_repo_dest }}"
    vrsctest_conf_path: "/home/{{ ansible_user }}/docker-verusd/vrsctest/data_dir/vrsctest.conf"
    # Written by playbook 49 — must be run first to fetch the WIF
    signer_wif_file: "/home/{{ ansible_user }}/.bwd_signer_wif"

  tasks:
    # ── 1. Verify repo is cloned ─────────────────────────────────────────────────
    - name: Verify qrcode repository exists
      ansible.builtin.stat:
        path: "{{ qr_path }}"
      register: qr_dir_stat
      failed_when: not qr_dir_stat.stat.exists

    # ── 2. Read vrsctest.conf ───────────────────────────────────────────────────
    - name: Slurp vrsctest.conf
      ansible.builtin.slurp:
        src: "{{ vrsctest_conf_path }}"
      register: vrsctest_conf_b64
      failed_when: false

    - name: Fail if vrsctest.conf not found
      ansible.builtin.fail:
        msg: |
          vrsctest.conf not found at {{ vrsctest_conf_path }}.
          Start VRSCTEST first so the config is generated.
      when: vrsctest_conf_b64.failed | default(false)

    # ── 3. Extract RPC credentials ──────────────────────────────────────────────
    - name: Extract rpcuser from vrsctest.conf
      ansible.builtin.set_fact:
        vrsctest_rpcuser: "{{ vrsctest_conf_b64.content | b64decode | regex_findall('^rpcuser=(.+)$', multiline=True) | first | trim }}"

    - name: Extract rpcpassword from vrsctest.conf
      ansible.builtin.set_fact:
        vrsctest_rpcpassword: "{{ vrsctest_conf_b64.content | b64decode | regex_findall('^rpcpassword=(.+)$', multiline=True) | first | trim }}"

    - name: Validate RPC credentials extracted
      ansible.builtin.assert:
        that:
          - vrsctest_rpcuser | length > 0
          - vrsctest_rpcpassword | length > 0
        fail_msg: "Could not extract rpcuser/rpcpassword from vrsctest.conf"

    # ── 4. Read SERVICE_SIGNER_WIF from file written by playbook 49 ─────────────
    - name: Fail if signer WIF file is missing
      ansible.builtin.fail:
        msg: |
          {{ signer_wif_file }} not found.
          Run playbook 49-fetch-signer-wif.yml first to fetch the SERVICE_SIGNER_WIF.
      when: not (ansible_user == 'root') and not (lookup('file', signer_wif_file, errors='ignore') | length > 0)

    - name: Read SERVICE_SIGNER_WIF from temp file
      ansible.builtin.slurp:
        src: "{{ signer_wif_file }}"
      register: signer_wif_b64
      failed_when: false

    - name: Fail if WIF could not be read
      ansible.builtin.fail:
        msg: |
          Could not read SERVICE_SIGNER_WIF from {{ signer_wif_file }}.
          Run playbook 49-fetch-signer-wif.yml first.
      when: signer_wif_b64.failed | default(false)

    - name: Set SERVICE_SIGNER_WIF fact
      ansible.builtin.set_fact:
        service_signer_wif: "{{ signer_wif_b64.content | b64decode | trim }}"

    # ── 5. Validate SERVICE_SIGNER_IADDRESS from inventory ────────────────────
    - name: Fail if SERVICE_SIGNER_IADDRESS is not set in inventory
      ansible.builtin.fail:
        msg: |
          bwd_service_signer_iaddress is not set in group_vars/production.yml.
          Add: bwd_service_signer_iaddress: "<i-address>"
          The i-address is the identityaddress from: verus -chain=VRSCTEST getidentity <identity@>
      when: not (bwd_service_signer_iaddress | length > 0)

    # ── 6. Write config.js ─────────────────────────────────────────────────────
    - name: Write config.js
      ansible.builtin.copy:
        content: |
          // config.js — auto-generated by ansible, do not commit
          module.exports = {
            RPC_HOST: "10.200.0.11",
            RPC_PORT: 18843,
            RPC_USER: "{{ vrsctest_rpcuser }}",
            RPC_PASSWORD: "{{ vrsctest_rpcpassword }}",
            SERVICE_SIGNER_IADDRESS: "{{ bwd_service_signer_iaddress }}",
            SERVICE_SIGNER_WIF: "{{ service_signer_wif }}",
          };
        dest: "{{ qr_path }}/config.js"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      register: config_written

    # ── 6b. Write Dockerfile ──────────────────────────────────────────────────
    - name: Write Dockerfile
      ansible.builtin.copy:
        content: |
          # Stage 1: Build TypeScript
          FROM node:20-alpine AS builder
          WORKDIR /build
          # git required for git+https:// deps in package.json
          RUN apk add --no-cache git
          COPY package.json yarn.lock .yarnrc.yml ./
          COPY .yarn .yarn/
          COPY .yarnrc.yml ./
          # Install deps (fetches git+https deps)
          RUN yarn install --immutable || yarn install
          COPY . .
          RUN yarn build

          # Stage 2: Minimal runtime
          FROM node:20-alpine
          WORKDIR /app
          # Install curl for healthcheck
          RUN apk add --no-cache curl
          COPY --from=builder /build/dist ./dist
          COPY --from=builder /build/config.js ./
          COPY --from=builder /build/package.json ./
          COPY --from=builder /build/node_modules ./node_modules
          COPY --from=builder /build/views ./views
          COPY --from=builder /build/public ./public
          EXPOSE 3000
          HEALTHCHECK --interval=30s --timeout=10s --start-period=15s --retries=3 \
            CMD curl -f http://localhost:3000/ || exit 1
          CMD ["node", "dist/server.js"]
        dest: "{{ qr_path }}/Dockerfile"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: dockerfile_written

    # ── 7. Summary ──────────────────────────────────────────────────────────────
    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          qrcodes configured for VRSCTEST:
            config.js  → {{ qr_path }}/config.js
            Dockerfile → {{ qr_path }}/Dockerfile
            RPC_HOST   → 10.200.0.11
            RPC_PORT   → 18843
            RPC_USER   → {{ vrsctest_rpcuser }}
            RPC_PASSWORD → <redacted>
            SERVICE_SIGNER_IADDRESS → {{ bwd_service_signer_iaddress }}
            SERVICE_SIGNER_WIF       → <read from {{ signer_wif_file }}>

          Next: run 35-qrcodes-vrsctest-build.yml to build the image
