# Playbook: 27-qr-creator-deploy.yml
# Purpose: Build and deploy the QR creator container via docker compose.
#          Uses fixed IP 10.201.0.13 on the VRSC mainnet Docker network.
# Run with: ansible-playbook -i inventory.ini playbooks/27-qr-creator-deploy.yml
#           Or with force rebuild: ansible-playbook -i inventory.ini playbooks/27-qr-creator-deploy.yml -e qr_rebuild=true
# Requires: 26-qr-creator-configure.yml (Dockerfile + compose written)
# Idempotent: safe to re-run — stops old container before starting fresh.

---
- name: Deploy verus-identity-qr-creator
  hosts: production
  become: false
  vars:
    qr_repo_path: "/home/{{ ansible_user }}/verus-identity-qr-creator"
    compose_file: "{{ qr_repo_path }}/docker-compose.yml"
    image_name: "buildwithdreams/verus-qr-creator"
    compose_project: "mains_blue_qr"
    container_name: "{{ compose_project }}-qr-1"
    docker_network: "net-vrsc-blue"
    qr_bind_ip: "10.201.0.13"
    qr_internal_port: "3000"
    rebuild: "{{ qr_rebuild | default(false) | bool }}"

  tasks:
    # ── 1. Verify compose file exists ──────────────────────────────────────────
    - name: Verify docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ compose_file }}"
      register: compose_stat
      failed_when: not compose_stat.stat.exists

    # ── 2. Check if image already exists ──────────────────────────────────────
    - name: Check for existing local image
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:local > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
      register: image_exists
      changed_when: false
      failed_when: false

    - name: Display build plan
      ansible.builtin.debug:
        msg: >
          Image {{ image_name }}:local — {{ 'already exists (force rebuild disabled)' if image_exists.stdout == 'exists' and not rebuild else 'will be built' if rebuild or image_exists.stdout != 'exists' else 'exists, skipping (use -e qr_rebuild=true to override)' }}

    # ── 3. Build Docker image ─────────────────────────────────────────────────
    - name: Build Docker image
      ansible.builtin.shell:
        cmd: "cd {{ qr_repo_path }} && docker build --no-cache -t {{ image_name }}:local -t {{ image_name }}:latest ."
      register: build_result
      when: rebuild or image_exists.stdout != 'exists'

    - name: Display build output
      ansible.builtin.debug:
        msg: "{{ build_result.stdout_lines | join('\\n') }}"
      when: rebuild or image_exists.stdout != 'exists'
      failed_when: false

    - name: Verify image exists after build
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:local > /dev/null 2>&1 && echo 'ok'"
      register: image_verify
      changed_when: false
      failed_when: false
      when: rebuild or image_exists.stdout != 'exists'

    - name: Display image details
      ansible.builtin.debug:
        msg: "Image {{ image_name }}:local built successfully"
      when: rebuild or image_exists.stdout != 'exists'

    # ── 4. Stop existing container if running ────────────────────────────────
    - name: Remove old container if it exists
      ansible.builtin.shell:
        cmd: "docker rm -f {{ container_name }} 2>/dev/null || true"
      changed_when: true
      failed_when: false

    # ── 5. Deploy with docker compose ─────────────────────────────────────────
    - name: Start QR creator container
      ansible.builtin.shell:
        cmd: "timeout 120 docker compose -f {{ compose_file }} -p {{ compose_project }} up -d --force-recreate"
      register: compose_up
      changed_when: true

    - name: Display deploy result
      ansible.builtin.debug:
        msg: "Container {{ container_name }} started: {{ compose_up.stdout_lines | join(' ') }}"

    # ── 6. Wait for container to be running ───────────────────────────────────
    - name: Verify container is running
      ansible.builtin.shell:
        cmd: "docker ps 2>&1 | grep '{{ container_name }}' | head -1 || true"
      register: running_verify
      changed_when: false
      retries: 10
      delay: 3
      until: running_verify.stdout | length > 0
      failed_when: false

    # ── 7. Fetch container logs ──────────────────────────────────────────────
    - name: Fetch container logs
      ansible.builtin.shell:
        cmd: "docker logs {{ container_name }} 2>&1 | tail -20"
      register: container_logs
      changed_when: false
      failed_when: false

    - name: Display container logs
      ansible.builtin.debug:
        msg: "Container logs:\n{{ container_logs.stdout_lines | join('\\n') }}"
      failed_when: false

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          QR Creator deployed:
            container  → {{ container_name }}
            image      → {{ image_name }}:local
            network    → {{ docker_network }}
            IP         → {{ qr_bind_ip }}
            port       → localhost:3000 → {{ qr_internal_port }}
            logs       → docker logs {{ container_name }}
