# Playbook: 34-qrcodes-clone.yml
# Purpose: Clone verus-identity-update-qr-creator-main to ~/qrcodes on target host.
# Run with: ansible-playbook -i inventory.ini playbooks/34-qrcodes-clone.yml
# Idempotent: skips if ~/qrcodes already exists; does git pull to update.
---
- name: Clone QRcodes repository
  hosts: production
  become: false
  vars:
    qr_repo_url: "https://github.com/VerusCoin/verus-identity-update-qr-creator-main.git"
    qr_repo_dest: "verus-identity-update-qr-creator-main"
    qr_path: "/home/{{ ansible_user }}/{{ qr_repo_dest }}"

  tasks:
    - name: Check if qrcodes directory already exists
      ansible.builtin.stat:
        path: "{{ qr_path }}"
      register: qr_dir_stat

    - name: Display clone plan
      ansible.builtin.debug:
        msg: >
          Clone {{ qr_repo_url }} to {{ qr_path }}.
          {{ 'Directory exists — will pull latest.' if qr_dir_stat.stat.exists else 'Will clone fresh.' }}

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ qr_repo_url }}"
        dest: "{{ qr_path }}"
        clone: "{{ not qr_dir_stat.stat.exists }}"
        update: true
        accept_hostkey: true
      register: clone_result

    - name: Display clone status
      ansible.builtin.debug:
        msg: "{{ 'Cloned fresh repository' if clone_result.changed else 'Repository already up-to-date' }}"
