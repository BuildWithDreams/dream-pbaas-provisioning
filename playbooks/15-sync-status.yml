---
# Purpose: Check sync status for VRSC and vDEX chains on BWD.
# Queries getinfo from both containers and reports local block height,
# network tip, sync gap, peer count, and TLS status.
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/15-sync-status.yml
#
# Or run directly on control node (no inventory needed):
#   ansible-playbook playbooks/15-sync-status.yml -i inventory.ini

- name: Check VRSC and vDEX sync status
  hosts: production
  gather_facts: false
  vars:
    ansible_user: dream-hermes-agent

  tasks:
    - name: Query VRSC getinfo
      ansible.builtin.shell:
        cmd: docker exec mains_blue-vrsc-1 verus getinfo 2>&1
      register: vrsc_info
      changed_when: false
      failed_when: false

    - name: Query vDEX getinfo
      ansible.builtin.shell:
        cmd: docker exec mains_blue-vdex-1 verus -chain=vdex getinfo 2>&1
      register: vdex_info
      changed_when: false
      failed_when: false

    - name: Parse VRSC blocks
      ansible.builtin.set_fact:
        vrsc_blocks: "{{ (vrsc_info.stdout | from_json).blocks if (vrsc_info.stdout is search('blocks')) else 0 }}"
        vrsc_longest: "{{ (vrsc_info.stdout | from_json).longestchain if (vrsc_info.stdout is search('longestchain')) else 0 }}"
        vrsc_tlptime: "{{ (vrsc_info.stdout | from_json).tiptime if (vrsc_info.stdout is search('tiptime')) else 0 }}"
        vrsc_peers: "{{ (vrsc_info.stdout | from_json).connections if (vrsc_info.stdout is search('connections')) else 0 }}"
        vrsc_tls: "{{ (vrsc_info.stdout | from_json).tls_established if (vrsc_info.stdout is search('tls_established')) else 0 }}"
        vrsc_name: "{{ (vrsc_info.stdout | from_json).name if (vrsc_info.stdout is search('\"name\"')) else 'VRSC' }}"
      when: vrsc_info.stdout is search('"blocks"')

    - name: Parse vDEX blocks
      ansible.builtin.set_fact:
        vdex_blocks: "{{ (vdex_info.stdout | from_json).blocks if (vdex_info.stdout is search('blocks')) else 0 }}"
        vdex_longest: "{{ (vdex_info.stdout | from_json).longestchain if (vdex_info.stdout is search('longestchain')) else 0 }}"
        vdex_tlptime: "{{ (vdex_info.stdout | from_json).tiptime if (vdex_info.stdout is search('tiptime')) else 0 }}"
        vdex_peers: "{{ (vdex_info.stdout | from_json).connections if (vdex_info.stdout is search('connections')) else 0 }}"
        vdex_tls: "{{ (vdex_info.stdout | from_json).tls_established if (vdex_info.stdout is search('tls_established')) else 0 }}"
        vdex_name: "{{ (vdex_info.stdout | from_json).name if (vdex_info.stdout is search('\"name\"')) else 'vDEX' }}"
      when: vdex_info.stdout is search('"blocks"')

    - name: Calculate sync gaps
      ansible.builtin.set_fact:
        vrsc_gap: "{{ (vrsc_longest | int) - (vrsc_blocks | int) }}"
        vdex_gap: "{{ (vdex_longest | int) - (vdex_blocks | int) }}"

    - name: Format timestamp
      ansible.builtin.set_fact:
        vrsc_tip_str: "{{ '%Y-%m-%d %H:%M:%S' | strftime(vrsc_tlptime | int) if vrsc_tlptime | int > 0 else 'N/A' }}"
        vdex_tip_str: "{{ '%Y-%m-%d %H:%M:%S' | strftime(vdex_tlptime | int) if vdex_tlptime | int > 0 else 'N/A' }}"

    - name: Display sync status report
      ansible.builtin.debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════╗
          ║           PBaaS Chain Sync Status — BWD                  ║
          ╠══════════════╦═══════════════╦══════════╦═══════════════╣
          ║ Chain         ║ Local / Tip   ║ Gap      ║ Peers / TLS    ║
          ╠══════════════╬═══════════════╬══════════╬═══════════════╣
          {% if vrsc_blocks | int > 0 %}
          ║ VRSC          ║ {{ '%07d' % (vrsc_blocks | int) }} / {{ '%07d' % (vrsc_longest | int) }} ║ {{ '%+7d' | format(vrsc_gap | int) }} ║ {{ '%3d' % (vrsc_peers | int) }} / {{ vrsc_tls | int }}       ║
          {% else %}
          ║ VRSC          ║    offline    ║    —     ║       —        ║
          {% endif %}
          {% if vdex_blocks | int > 0 %}
          ║ vDEX          ║ {{ '%07d' % (vdex_blocks | int) }} / {{ '%07d' % (vdex_longest | int) }} ║ {{ '%+7d' | format(vdex_gap | int) }} ║ {{ '%3d' % (vdex_peers | int) }} / {{ vdex_tls | int }}       ║
          {% else %}
          ║ vDEX          ║    offline    ║    —     ║       —        ║
          {% endif %}
          ╚══════════════╩═══════════════╩══════════╩═══════════════╝

    - name: Show raw error if VRSC is down
      ansible.builtin.debug:
        msg: "VRSC error: {{ vrsc_info.stderr | default(vrsc_info.stdout) }}"
      when: vrsc_blocks | int == 0

    - name: Show raw error if vDEX is down
      ansible.builtin.debug:
        msg: "vDEX error: {{ vdex_info.stderr | default(vdex_info.stdout) }}"
      when: vdex_blocks | int == 0
