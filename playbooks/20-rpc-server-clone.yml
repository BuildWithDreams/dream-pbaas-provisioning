# Playbook: 20-rpc-server-clone.yml
# Purpose: Clone the official Verus Rust RPC server repository
# Run with: ansible-playbook -i inventory.ini playbooks/20-rpc-server-clone.yml
# Idempotent: skips if /home/{{ ansible_user }}/rust_verusd_rpc_server already exists

---
- name: Clone Verus RPC server repository
  hosts: production
  become: false
  vars:
    rpc_repo_url: "https://github.com/veruscoin/rust_verusd_rpc_server.git"
    rpc_server_path: "/home/{{ ansible_user }}/rust_verusd_rpc_server"

  tasks:
    - name: Check if RPC server directory already exists
      ansible.builtin.stat:
        path: "{{ rpc_server_path }}"
      register: rpc_dir_stat

    - name: Display clone plan
      ansible.builtin.debug:
        msg: >
          Clone {{ rpc_repo_url }} to {{ rpc_server_path }}.
          {{ 'Directory exists — will pull latest.' if rpc_dir_stat.stat.exists else 'Will clone fresh.' }}

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ rpc_repo_url }}"
        dest: "{{ rpc_server_path }}"
        clone: "{{ not rpc_dir_stat.stat.exists }}"
        update: true
        accept_hostkey: true
      register: clone_result

    - name: Display clone status
      ansible.builtin.debug:
        msg: "{{ 'Cloned fresh repository' if clone_result.changed else 'Repository already up-to-date' }}"
