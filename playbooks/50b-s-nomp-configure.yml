# Playbook: 50b-s-nomp-configure.yml
# Purpose: Configure s-nomp for VRSCTEST — write config.json, website.json, Dockerfile.
#          Reads VRSCTEST daemon credentials from vrsctest.conf at first run.
# Run with: ansible-playbook -i inventory.ini playbooks/50b-s-nomp-configure.yml
#           -e "pool_address=RTEST..."
# Requires: 50-s-nomp-clone.yml (repo cloned)
# Idempotent: safe to re-run — replaces config files each time.
---
- name: Configure s-nomp for VRSCTEST
  hosts: production
  become: false
  vars:
    s_nomp_path: "/home/{{ ansible_user }}/s-nomp"
    docker_verusd_path: "/home/{{ ansible_user }}/docker-verusd"
    vrsctest_conf: "{{ docker_verusd_path }}/vrsctest/data_dir/vrsctest.conf"

    # Pool settings
    pool_host: "pool.vrsctest.buildwithdreams.com"
    pool_fee: "0.5"
    pool_name: "BuildWithDreams VRSCTEST Pool"

    # Network
    daemon_host: "10.200.0.11"
    daemon_rpc_port: "18843"

    # Stratum ports
    stratum_internal_port: "3333"
    stratum_external_port: "3334"
    website_port: "3000"

    # Pool wallet (must be provided via -e; defaults to empty for testnet)
    pool_address: "{{ pool_address | default('') }}"
    pool_passphrase: "{{ pool_passphrase | default('') }}"

  tasks:
    # ── 0. Require pool_address ─────────────────────────────────────────────────
    - name: Require pool_address parameter
      ansible.builtin.assert:
        that:
          - pool_address is defined
          - pool_address | length > 0
        fail_msg: "pool_address must be provided via -e \"pool_address=RTEST...\""
        success_msg: "pool_address validated"

    # ── 1. Verify s-nomp was cloned ────────────────────────────────────────────
    - name: Verify s-nomp repo exists
      ansible.builtin.stat:
        path: "{{ s_nomp_path }}"
      register: s_nomp_stat
      failed_when: not s_nomp_stat.stat.exists

    # ── 2. Read VRSCTEST RPC credentials from daemon conf ──────────────────────
    - name: Check for existing vrsctest.conf
      ansible.builtin.stat:
        path: "{{ vrsctest_conf }}"
      register: vrsctest_conf_stat

    - name: Extract rpcuser from vrsctest.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcuser=' {{ vrsctest_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo ''"
      register: daemon_rpcuser
      changed_when: false
      failed_when: false
      when: vrsctest_conf_stat.stat.exists

    - name: Extract rpcpassword from vrsctest.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcpassword=' {{ vrsctest_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo ''"
      register: daemon_rpcpass
      changed_when: false
      failed_when: false
      when: vrsctest_conf_stat.stat.exists

    - name: Fail if vrsctest.conf not found
      ansible.builtin.fail:
        msg: |
          vrsctest.conf not found at {{ vrsctest_conf }}.
          Start the VRSCTEST daemon first (08b-start-vrsctest.yml).
      when: not vrsctest_conf_stat.stat.exists

    - name: Fail if credentials not extractable
      ansible.builtin.fail:
        msg: "Could not extract rpcuser/rpcpassword from vrsctest.conf"
      when: daemon_rpcuser.stdout | trim | length == 0 or daemon_rpcpass.stdout | trim | length == 0

    - name: Set credential facts
      ansible.builtin.set_fact:
        daemon_rpc_user: "{{ daemon_rpcuser.stdout | trim }}"
        daemon_rpc_pass: "{{ daemon_rpcpass.stdout | trim }}"

    - name: Display credential source
      ansible.builtin.debug:
        msg: "Using VRSCTEST daemon credentials from vrsctest.conf — user={{ daemon_rpc_user }}"

    # ── 3. Ensure coins/testnet/verustest.json exists ───────────────────────────
    # init.js looks for coins in pool_configs/<name>.json → "coin": "testnet/verustest.json"
    # → resolves to coins/testnet/verustest.json
    - name: Create coins/testnet/ directory
      ansible.builtin.file:
        path: "{{ s_nomp_path }}/coins/testnet"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy verustest coin definition to coins/testnet/
      ansible.builtin.copy:
        remote_src: true
        src: "{{ s_nomp_path }}/coins/verustest.json"
        dest: "{{ s_nomp_path }}/coins/testnet/verustest.json"
        mode: '0644'
      register: coin_copied

    # ── 4. Write config.json (portal-level settings) ─────────────────────────
    - name: Write s-nomp config.json
      ansible.builtin.copy:
        content: |
          {
            "logLevel": "debug",
            "logColors": true,
            "cliPort": 17117,
            "cliServer": "127.0.0.1",
            "clustering": {
              "enabled": false,
              "forks": "auto"
            },
            "defaultPoolConfigs": {
              "blockRefreshInterval": 500,
              "jobRebroadcastTimeout": 55,
              "connectionTimeout": 600,
              "emitInvalidBlockHashes": false,
              "validateWorkerUsername": true,
              "tcpProxyProtocol": false,
              "banning": {
                "enabled": true,
                "time": 600,
                "invalidPercent": 50,
                "checkThreshold": 500,
                "purgeInterval": 300
              }
            },
            "website": {
              "enabled": true,
              "host": "0.0.0.0",
              "port": {{ website_port }},
              "stratumHost": "{{ pool_host }}",
              "stats": {
                "updateInterval": 30,
                "historicalRetention": 14400,
                "hashrateWindow": 300
              },
              "adminCenter": {
                "enabled": false,
                "password": ""
              },
              "tlsOptions": {
                "enabled": false,
                "cert": "",
                "key": ""
              }
            }
          }
        dest: "{{ s_nomp_path }}/config.json"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: config_written

    - name: Display config.json status
      ansible.builtin.debug:
        msg: "config.json written to {{ s_nomp_path }}/config.json"

    # ── 5. Write pool_configs/verustest.json ──────────────────────────────────
    # This is the per-pool config that init.js reads from pool_configs/
    - name: Write pool_configs/verustest.json
      ansible.builtin.copy:
        content: |
          {
            "enabled": true,
            "coin": "testnet/verustest.json",

            "address": "{{ pool_address }}",
            "_comment_address": "transparent address for coinbase rewards",

            "zAddress": "",
            "_comment_zAddress": "not used for Verus testnet",

            "tAddress": "{{ pool_address }}",
            "_comment_tAddress": "pool outgoing address for payments",

            "invalidAddress": "{{ pool_address }}",

            "walletInterval": 1,

            "rewardRecipients": {
              "{{ pool_address }}": {{ pool_fee }}
            },

            "tlsOptions": {
              "enabled": false,
              "serverKey": "",
              "serverCert": "",
              "ca": ""
            },

            "paymentProcessing": {
              "enabled": true,
              "minConf": 3,
              "paymentMode": "prop",
              "_comment_paymentMode": "prop = proportional, pplnt = pay per last N shares",
              "paymentInterval": 120,
              "minimumPayment": 0.1,
              "maxBlocksPerPayment": 8,
              "daemon": {
                "host": "{{ daemon_host }}",
                "port": {{ daemon_rpc_port }},
                "user": "{{ daemon_rpc_user }}",
                "password": "{{ daemon_rpc_pass }}"
              }
            },

            "ports": {
              "{{ stratum_internal_port }}": {
                "tls": false,
                "diff": 0.5,
                "varDiff": {
                  "minDiff": 0.001,
                  "maxDiff": 65536,
                  "targetTime": 15,
                  "retargetTime": 60,
                  "variancePercent": 30
                }
              },
              "{{ stratum_external_port }}": {
                "tls": false,
                "diff": 0.5,
                "varDiff": {
                  "minDiff": 0.001,
                  "maxDiff": 65536,
                  "targetTime": 15,
                  "retargetTime": 60,
                  "variancePercent": 30
                }
              }
            },

            "poolId": "main",

            "daemons": [
              {
                "host": "{{ daemon_host }}",
                "port": {{ daemon_rpc_port }},
                "user": "{{ daemon_rpc_user }}",
                "password": "{{ daemon_rpc_pass }}"
              }
            ],

            "p2p": {
              "enabled": false,
              "host": "{{ daemon_host }}",
              "port": 18332,
              "disableTransactions": true
            },

            "mposMode": {
              "enabled": false
            }
          }
        dest: "{{ s_nomp_path }}/pool_configs/verustest.json"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: pool_config_written

    - name: Display pool config status
      ansible.builtin.debug:
        msg: "pool_configs/verustest.json written to {{ s_nomp_path }}/pool_configs/verustest.json"

    # ── 6. Write Dockerfile ────────────────────────────────────────────────────
    # Multi-stage: host has pre-installed node_modules (SSH credentials).
    # Dockerfile copies them directly — no npm install inside Docker.
    - name: Write Dockerfile
      ansible.builtin.copy:
        content: |
          # Stage 1: Copy pre-installed node_modules from host build context.
          # npm install was run on the host where GitHub SSH credentials are available.
          # This stage just packages everything for the runtime image.
          FROM node:20-alpine AS deps
          WORKDIR /deps

          # Install runtime libs needed for native modules
          RUN apk add --no-cache bind-tools curl libsodium-dev && rm -rf /var/cache/apk/*

          COPY . .

          # Stage 2: Minimal runtime
          FROM node:20-alpine
          WORKDIR /app

          RUN apk add --no-cache bind-tools curl libsodium-dev && rm -rf /var/cache/apk/*

          COPY --from=deps /deps/node_modules /app/node_modules
          COPY --from=deps /deps/package.json /app/package.json
          COPY --from=deps /deps/package-lock.json* /app/package-lock.json*
          COPY --from=deps /deps/config.json /app/config.json
          COPY --from=deps /deps/website.json /app/website.json
          COPY --from=deps /deps/init.js /app/init.js
          COPY --from=deps /deps/libs/ /app/libs/
          COPY --from=deps /deps/scripts/ /app/scripts/
          COPY --from=deps /deps/public/ /app/public/
          COPY --from=deps /deps/views/ /app/views/
          COPY --from=deps /deps/middleware/ /app/middleware/
          COPY --from=deps /deps/cli/ /app/cli/
          COPY --from=deps /deps/pool_configs/ /app/pool_configs/
          COPY --from=deps /deps/coins/ /app/coins/

          EXPOSE {{ website_port }}

          HEALTHCHECK --interval=30s --timeout=10s --start-period=30s --retries=3 \
            CMD wget -qO- http://localhost:{{ website_port }}/ > /dev/null || exit 0

          CMD ["node", "init.js"]
        dest: "{{ s_nomp_path }}/Dockerfile"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: dockerfile_written

    - name: Display Dockerfile status
      ansible.builtin.debug:
        msg: "Dockerfile written to {{ s_nomp_path }}/Dockerfile"

    # ── 7. Write website.json ─────────────────────────────────────────────────
    - name: Write website.json
      ansible.builtin.copy:
        content: |
          {
            "siteTitle": "{{ pool_name }}",
            "siteLogo": "",
            "poolHost": "{{ pool_host }}",
            "poolFee": "{{ pool_fee }}%",
            "coin": "verustest",
            "coinDisplayName": "Verus Testnet",
            "useserverclientsidewallet": false,
            "showWorkersTable": true,
            "showWorkersTablePerPort": false,
            "poolFeeAddress": "{{ pool_address }}",
            "version": "1.0.0",
            "paymentInterval": "2 minutes",
            "minimumPayment": "0.1 VRSC",
            "marketPriceRefreshInterval": "5 minutes",
            "enablePaymentProofs": false,
            "enableAutoExchange": false,
            "defaultLang": "en",
            "social": {
              "twitter": "",
              "facebook": "",
              "youtube": "",
              "discord": "",
              "bitcointalk": "",
              "github": "https://github.com/VerusCoin/s-nomp",
              "odoo": ""
            },
            "theme": "light",
            "primaryColor": "#1a4f91",
            "secondaryColor": "#d4af37"
          }
        dest: "{{ s_nomp_path }}/website.json"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: website_written

    - name: Display website.json status
      ansible.builtin.debug:
        msg: "website.json written to {{ s_nomp_path }}/website.json"

    # ── 6. Summary ─────────────────────────────────────────────────────────────
    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          s-nomp configured for VRSCTEST:
            config.json           → {{ s_nomp_path }}/config.json
            pool_configs/verustest.json → {{ s_nomp_path }}/pool_configs/verustest.json
            coins/testnet/verustest.json → {{ s_nomp_path }}/coins/testnet/verustest.json
            website.json          → {{ s_nomp_path }}/website.json
            Dockerfile            → {{ s_nomp_path }}/Dockerfile

          Pool settings:
            coin                  → Verus Testnet (verustest)
            pool_address          → {{ pool_address }}
            pool_fee              → {{ pool_fee }}%
            daemon                → {{ daemon_host }}:{{ daemon_rpc_port }}
            website               → internal {{ website_port }}
            stratum-int port      → {{ stratum_internal_port }} (localhost)
            stratum-ext port      → {{ stratum_external_port }} (internet)

          Next: ansible-playbook playbooks/51-s-nomp-build.yml
