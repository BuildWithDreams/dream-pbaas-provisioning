# Playbook: 21-rpc-server-configure.yml
# Purpose: Configure Conf.toml for the Verus RPC server — daemon URL, bind IP,
#          port, and RPC credentials. Reads existing credentials from VRSC.conf
#          if present; otherwise generates secure random credentials.
# Run with: ansible-playbook -i inventory.ini playbooks/21-rpc-server-configure.yml
# Requires: 20-rpc-server-clone.yml (repo must be cloned first)
# Idempotent: safe to re-run — replace tasks update existing values in place.

---
- name: Configure Verus RPC server
  hosts: production
  become: false
  vars:
    rpc_server_path: "/home/{{ ansible_user }}/rust_verusd_rpc_server"
    conf_toml: "{{ rpc_server_path }}/Conf.toml"
    docker_verusd_path: "/home/{{ ansible_user }}/docker-verusd"
    vrsc_conf: "{{ docker_verusd_path }}/mainnet/data_dir/VRSC/VRSC.conf"
    rpc_bind_ip: "10.201.0.12"
    rpc_bind_port: "37486"
    vrsc_daemon_ip: "10.201.0.11"
    vrsc_rpc_port: "27486"

  tasks:
    # ── 1. Verify repo was cloned ─────────────────────────────────────────────
    - name: Verify RPC server repo exists
      ansible.builtin.stat:
        path: "{{ rpc_server_path }}"
      register: rpc_repo_stat
      failed_when: not rpc_repo_stat.stat.exists

    # ── 2. Check if VRSC.conf has credentials ─────────────────────────────────
    - name: Check for existing VRSC.conf
      ansible.builtin.stat:
        path: "{{ vrsc_conf }}"
      register: vrsc_conf_stat

    # ── 3. Always generate credentials (shell module, no Jinja interpolation) ────
    - name: Generate rpcuser
      ansible.builtin.shell:
        cmd: "python3 -c \"import secrets; print(secrets.token_hex(16))\""
      register: gen_rpcuser
      changed_when: false

    - name: Generate rpcpassword
      ansible.builtin.shell:
        cmd: "python3 -c \"import secrets; print(secrets.token_hex(24))\""
      register: gen_rpcpass
      changed_when: false

    # ── 4. Set credential facts — prefer VRSC.conf, fall back to generated ──────
    - name: Read rpcuser from VRSC.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcuser=' {{ vrsc_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo ''"
      register: vrsc_rpcuser
      changed_when: false
      failed_when: false
      when: vrsc_conf_stat.stat.exists

    - name: Read rpcpassword from VRSC.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcpassword=' {{ vrsc_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo ''"
      register: vrsc_rpcpass
      changed_when: false
      failed_when: false
      when: vrsc_conf_stat.stat.exists

    - name: Set final credential facts
      ansible.builtin.set_fact:
        rpc_user: "{{ (vrsc_rpcuser.stdout | trim) if (vrsc_conf_stat.stat.exists and vrsc_rpcuser.stdout | trim | length > 0) else (gen_rpcuser.stdout | trim) }}"
        rpc_pass: "{{ (vrsc_rpcpass.stdout | trim) if (vrsc_conf_stat.stat.exists and vrsc_rpcpass.stdout | trim | length > 0) else (gen_rpcpass.stdout | trim) }}"

    - name: Display credential source
      ansible.builtin.debug:
        msg: "Credentials: {{ 'VRSC.conf' if vrsc_conf_stat.stat.exists and vrsc_rpcuser.stdout | trim | length > 0 else 'generated' }} → user={{ rpc_user }}"

    # ── 5. Create Dockerfile (multi-stage build for Rust project) ────────────────
    - name: Write Dockerfile
      ansible.builtin.copy:
        content: |
          # Stage 1: Build the Rust binary
          FROM rust:latest AS builder
          WORKDIR /build
          COPY Cargo.toml Cargo.lock ./
          COPY src/ ./src/
          RUN cargo build --release

          # Stage 2: Minimal runtime image
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
              ca-certificates curl \
              && rm -rf /var/lib/apt/lists/*
          COPY --from=builder /build/target/release/rust_verusd_rpc_server /usr/local/bin/rust_verusd_rpc_server
          COPY Conf.toml /Conf.toml
          WORKDIR /
          EXPOSE 37486
          CMD ["rust_verusd_rpc_server", "/Conf.toml"]
        dest: "{{ rpc_server_path }}/Dockerfile"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    # ── 6. Update Conf.toml ───────────────────────────────────────────────────
    - name: Update Conf.toml rpc_url
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^rpc_url=.*'
        replace: 'rpc_url = "http://{{ rpc_user }}:{{ rpc_pass }}@{{ vrsc_daemon_ip }}:{{ vrsc_rpc_port }}"'
      register: conf_rpc_url_updated

    - name: Update Conf.toml rpc_user
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^rpc_user=.*'
        replace: 'rpc_user = "{{ rpc_user }}"'
      register: conf_rpc_user_updated

    - name: Update Conf.toml rpc_password
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^rpc_password=.*'
        replace: 'rpc_password = "{{ rpc_pass }}"'
      register: conf_rpc_pass_updated

    - name: Update Conf.toml server_addr
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^server_addr=.*'
        replace: 'server_addr = "{{ rpc_bind_ip }}"'
      register: conf_server_addr_updated

    - name: Update Conf.toml server_port
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^server_port=.*'
        replace: 'server_port = {{ rpc_bind_port }}'
      register: conf_server_port_updated

    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          Conf.toml configured:
            rpc_url       → http://{{ rpc_user }}:[redacted]@{{ vrsc_daemon_ip }}:{{ vrsc_rpc_port }}
            rpc_user      → {{ rpc_user }}
            rpc_password  → [redacted]
            server_addr   → {{ rpc_bind_ip }}
            server_port   → {{ rpc_bind_port }}
          All 5 fields updated.
