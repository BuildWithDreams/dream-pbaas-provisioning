# Playbook: 21-rpc-server-configure.yml
# Purpose: Configure Conf.toml for the Verus RPC server — daemon URL, bind IP,
#          port, and RPC credentials. Reads existing credentials from VRSC.conf
#          if present; otherwise generates secure random credentials.
#          Also ensures VRSC daemon accepts connections from the RPC server subnet.
# Run with: ansible-playbook -i inventory.ini playbooks/21-rpc-server-configure.yml
# Requires: 20-rpc-server-clone.yml (repo must be cloned first)
# Idempotent: safe to re-run — replace tasks update existing values in place.

---
- name: Configure Verus RPC server
  hosts: production
  become: false
  vars:
    rpc_server_path: "/home/{{ ansible_user }}/rust_verusd_rpc_server"
    conf_toml: "{{ rpc_server_path }}/Conf.toml"
    docker_verusd_path: "/home/{{ ansible_user }}/docker-verusd"
    vrsc_conf: "{{ docker_verusd_path }}/mainnet/data_dir/VRSC/VRSC.conf"
    # Fixed IP assignment for RPC server (per /24 convention: .11=daemon, .12=RPC)
    rpc_bind_ip: "10.201.0.12"
    rpc_bind_port: "37486"
    # VRSC daemon address (inside Docker network)
    vrsc_daemon_ip: "10.201.0.11"
    vrsc_rpc_port: "27486"

  tasks:
    # ── 1. Verify repo was cloned ─────────────────────────────────────────────
    - name: Verify RPC server repo exists
      ansible.builtin.stat:
        path: "{{ rpc_server_path }}"
      register: rpc_repo_stat
      failed_when: not rpc_repo_stat.stat.exists

    # ── 2. Read RPC credentials from existing VRSC.conf ─────────────────────
    - name: Check for existing VRSC.conf
      ansible.builtin.stat:
        path: "{{ vrsc_conf }}"
      register: vrsc_conf_stat

    - name: Read rpcuser from VRSC.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcuser=' {{ vrsc_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo '{{ '{{' }}NOT_FOUND{{ '}}' }}'"
      register: vrsc_rpcuser
      changed_when: false
      failed_when: false
      when: vrsc_conf_stat.stat.exists

    - name: Read rpcpassword from VRSC.conf
      ansible.builtin.shell:
        cmd: "grep '^rpcpassword=' {{ vrsc_conf }} 2>/dev/null | head -1 | cut -d= -f2 || echo '{{ '{{' }}NOT_FOUND{{ '}}' }}'"
      register: vrsc_rpcpassword
      changed_when: false
      failed_when: false
      when: vrsc_conf_stat.stat.exists

    # ── 3. Generate credentials if not found ─────────────────────────────────
    - name: Set credential facts — use existing VRSC.conf credentials
      ansible.builtin.set_fact:
        rpc_user: "{{ vrsc_rpcuser.stdout | trim }}"
        rpc_pass: "{{ vrsc_rpcpassword.stdout | trim }}"
      when:
        - vrsc_conf_stat.stat.exists
        - vrsc_rpcuser.stdout | trim != '{{' + '{{'}}NOT_FOUND{{ '}}' + '}}'
        - vrsc_rpcpassword.stdout | trim != '{{' + '{{'}}NOT_FOUND{{ '}}' + '}}'

    - name: Generate random credentials when VRSC.conf credentials not available
      ansible.builtin.shell:
        cmd: "python3 -c \"import secrets; print(secrets.token_hex(16))\""
      register: generated_rpcuser
      changed_when: false
      when: not (vrsc_conf_stat.stat.exists and vrsc_rpcuser.stdout | trim != '{{' + '{{'}}NOT_FOUND{{ '}}' + '}}')

    - name: Generate random password
      ansible.builtin.shell:
        cmd: "python3 -c \"import secrets; print(secrets.token_hex(24))\""
      register: generated_rpcpass
      changed_when: false
      when: not (vrsc_conf_stat.stat.exists and vrsc_rpcpassword.stdout | trim != '{{' + '{{'}}NOT_FOUND{{ '}}' + '}}')

    - name: Set credential facts — use generated credentials
      ansible.builtin.set_fact:
        rpc_user: "{{ generated_rpcuser.stdout | trim }}"
        rpc_pass: "{{ generated_rpcpass.stdout | trim }}"
      when: rpc_user is not defined

    - name: Display credential source
      ansible.builtin.debug:
        msg: >
          RPC credentials: {{ 'read from VRSC.conf' if vrsc_conf_stat.stat.exists and vrsc_rpcuser.stdout != '{{{{}}}}NOT_FOUND{{}}}}' else 'generated randomly' }}.
          User: {{ rpc_user }}

    # ── 4. Update Conf.toml — daemon URL ──────────────────────────────────────
    - name: Update Conf.toml daemon_url
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^daemon_url=.*'
        replace: 'daemon_url = "http://{{ rpc_user }}:{{ rpc_pass }}@{{ vrsc_daemon_ip }}:{{ vrsc_rpc_port }}"'
      register: conf_daemon_updated

    # ── 5. Update Conf.toml — bind IP ─────────────────────────────────────────
    - name: Update Conf.toml bind IP
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^bind_ip=.*'
        replace: 'bind_ip = "{{ rpc_bind_ip }}"'
      register: conf_bind_ip_updated

    # ── 6. Update Conf.toml — bind port ──────────────────────────────────────
    - name: Update Conf.toml bind port
      ansible.builtin.replace:
        path: "{{ conf_toml }}"
        regexp: '^bind_port=.*'
        replace: 'bind_port = {{ rpc_bind_port }}'
      register: conf_bind_port_updated

    # ── 7. Summary ─────────────────────────────────────────────────────────────
    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          Conf.toml configured:
            daemon_url → http://{{ rpc_user }}:{{ rpc_pass }}@{{ vrsc_daemon_ip }}:{{ vrsc_rpc_port }}
            bind_ip   → {{ rpc_bind_ip }}
            bind_port → {{ rpc_bind_port }}
          Daemon URL updated: {{ conf_daemon_updated.changed }}
          Bind IP updated:     {{ conf_bind_ip_updated.changed }}
          Bind port updated:   {{ conf_bind_port_updated.changed }}
