# Playbook: 02-clone-repos.yml
# Purpose: Clone repositories to target host
# Run with: ansible-playbook -i inventory.ini playbooks/02-clone-repos.yml
# ⚠️ Edit clone_repos list below with your repository URLs

---
- name: Clone repositories
  hosts: production
  become: false
  vars:
    # Add repositories here: { repo: "git@github.com:org/repo.git", dest: "~/repo-name" }
    clone_repos:
      - { repo: "https://github.com/BuildWithDreams/docker-verusd.git", dest: "/home/{{ ansible_user }}/{{ clone_destinations.docker_verusd }}", branch: "feature/vrsctest" }

  tasks:
    - name: Reset any local changes before clone
      ansible.builtin.shell:
        cmd: "git -C {{ item.dest }} fetch origin && git -C {{ item.dest }} reset --hard origin/{{ item.branch }} 2>&1"
      loop: "{{ clone_repos }}"
      when: item.branch is defined
      register: repo_reset

    - name: Clone repository
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ item.dest }}"
        clone: true
        update: true
        accept_hostkey: true
        version: "{{ item.branch | default('main') }}"
        force: true
      loop: "{{ clone_repos }}"
      register: clone_result

    - name: Display clone status
      ansible.builtin.debug:
        msg: "Cloned {{ item.item.repo }} to {{ item.item.dest }}"
      loop: "{{ clone_result.results }}"
      when: item.changed
