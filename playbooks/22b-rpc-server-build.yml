# Playbook: 22b-rpc-server-build.yml
# Purpose: Build the Verus RPC server Docker image for VRSCTEST
# Run with: ansible-playbook -i inventory.ini playbooks/22b-rpc-server-build.yml
#           Or with force rebuild: ansible-playbook -i inventory.ini playbooks/22b-rpc-server-build.yml -e rpc_server_rebuild=true
# Requires: 21b-rpc-server-configure.yml (Conf.toml must be set)
# Idempotent: skips if buildwithdreams/rpc_server:vrsctest already exists, unless rpc_server_rebuild=true

---
- name: Build Verus RPC server image for VRSCTEST
  hosts: production
  become: false
  vars:
    rpc_server_path: "/home/{{ ansible_user }}/rust_verusd_rpc_server"
    image_name: "buildwithdreams/rpc_server"
    image_tag: "vrsctest"
    rebuild: "{{ rpc_server_rebuild | default(false) | bool }}"

  tasks:
    # ── 1. Verify Conf.toml exists ────────────────────────────────────────────
    - name: Verify Conf.toml exists
      ansible.builtin.stat:
        path: "{{ rpc_server_path }}/Conf.toml"
      register: conf_toml_stat
      failed_when: not conf_toml_stat.stat.exists

    # ── 2. Check if image already exists ──────────────────────────────────────
    - name: Check for existing local image
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:{{ image_tag }} > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
      register: image_exists
      changed_when: false
      failed_when: false

    - name: Display build plan
      ansible.builtin.debug:
        msg: >
          Image {{ image_name }}:{{ image_tag }} — {{ 'will be built' if (rebuild or image_exists.stdout != 'exists') else 'already exists (force rebuild disabled)' }}

    # ── 3. Build Docker image ─────────────────────────────────────────────────
    - name: Build Docker image
      ansible.builtin.shell:
        cmd: "touch {{ rpc_server_path }}/Conf.toml && cd {{ rpc_server_path }} && docker build --no-cache -t {{ image_name }}:{{ image_tag }} -t {{ image_name }}:{{ image_tag }}-latest ."
      register: build_result
      when: rebuild or image_exists.stdout != 'exists'

    - name: Display build output
      ansible.builtin.debug:
        msg: "Build started: {{ image_name }}:{{ image_tag }}"
      when: rebuild or image_exists.stdout != 'exists'
      failed_when: false

    - name: Display full build stdout
      ansible.builtin.debug:
        var: build_result.stdout_lines
      when: rebuild or image_exists.stdout != 'exists'
      failed_when: false

    # ── 4. Verify image was created ───────────────────────────────────────────
    - name: Verify image exists after build
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:{{ image_tag }} > /dev/null 2>&1 && echo 'ok'"
      register: image_verify
      changed_when: false
      failed_when: false
      when: rebuild or image_exists.stdout != 'exists'

    - name: Display image details
      ansible.builtin.debug:
        msg: "Image {{ image_name }}:{{ image_tag }} built successfully"
      when: rebuild or image_exists.stdout != 'exists'
