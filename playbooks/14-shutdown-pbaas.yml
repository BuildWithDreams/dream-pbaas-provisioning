# Playbook: 14-shutdown-pbaas.yml
# Purpose: Gracefully shut down a PBaaS chain container.
#          Idempotent — safe to run even if no container is running.
#
# What it does:
#   1. Detect running PBaaS container by chain name pattern
#   2. Wait for daemon to be ready (block index loaded) — polling getinfo
#   3. Signal verusd to stop gracefully (verus-cli stop)
#   4. docker stop with extended timeout
#   5. Disconnect from network to release the IP
#   6. Ensure BOOTSTRAP_FLAG is cleared in .env (clean shutdown marker)
#
# Run with: ansible-playbook -i inventory.ini playbooks/14-shutdown-pbaas.yml -e pbaas_chain=varrr
#
# Required vars:
#   pbaas_chain   — chain name: varrr, vdex, or chips

---
- name: Shutdown PBaaS chain
  hosts: production
  become: false
  vars:
    docker_verusd_path: "/home/{{ ansible_user }}/docker-verusd"
    pbaas_chain_info:
      varrr:
        subdir: pbaas/varrr
        hex: e9e10955b7d16031e3d6f55d9c908a038e3ae47d
      vdex:
        subdir: pbaas/vdex
        hex: 53fe39eea8c06bba32f1a4e20db67e5524f0309d
      chips:
        subdir: pbaas/chips
        hex: f315367528394674d45277e369629605a1c3ce9f
    # Daemon readiness check — wait up to 5 min for block index to load
    startup_wait_seconds: 300
    startup_poll_seconds: 15

  tasks:
    # 1. Validate pbaas_chain
    - name: Validate pbaas_chain is known
      ansible.builtin.assert:
        that:
          - pbaas_chain in pbaas_chain_info
        fail_msg: "Unknown pbaas_chain: '{{ pbaas_chain }}'. Must be one of: varrr, vdex, chips."
        success_msg: "pbaas_chain '{{ pbaas_chain }}' validated"

    # 2. Derive paths
    - name: Set chain paths
      ansible.builtin.set_fact:
        chain_subdir: "{{ pbaas_chain_info[pbaas_chain].subdir }}"
        currencyid_hex: "{{ pbaas_chain_info[pbaas_chain].hex }}"

    - name: Set chain paths
      ansible.builtin.set_fact:
        chain_path: "{{ docker_verusd_path }}/{{ chain_subdir }}"
        container_name: "{{ pbaas_chain }}_blue-{{ pbaas_chain }}-1"

    # 3. Detect running PBaaS container
    - name: Find running PBaaS container
      ansible.builtin.shell:
        cmd: !unsafe 'docker ps --format "{{.Names}}" | grep -E "_{{ pbaas_chain }}-{{ pbaas_chain }}-1$" || true'
      register: running_container
      changed_when: false

    - name: Display container status
      ansible.builtin.debug:
        msg: "Found container: {{ running_container.stdout | default('none') }}"
      when: running_container.stdout | length > 0

    - name: Skip if no container running
      ansible.builtin.debug:
        msg: "No {{ pbaas_chain }} container running — nothing to shutdown"
      when: running_container.stdout | length == 0

    # 4. Wait for daemon to be ready (block index loaded) before sending stop signal
    - name: Wait for daemon to be ready
      ansible.builtin.shell:
        cmd: "docker exec {{ running_container.stdout }} verus getinfo 2>&1"
      register: getinfo_result
      changed_when: false
      failed_when: false
      until: "'Loading block index' not in getinfo_result.stdout and getinfo_result.rc == 0"
      retries: "{{ (startup_wait_seconds / startup_poll_seconds) | int }}"
      delay: "{{ startup_poll_seconds }}"
      when: running_container.stdout | length > 0

    - name: Check if daemon is still loading
      ansible.builtin.debug:
        msg: "Daemon is still loading block index — waiting... (this is normal after a no-bootstrap restart)"
      when: running_container.stdout | length > 0 and getinfo_result.changed

    # 5. Graceful verusd shutdown (verus-cli stop)
    - name: Signal verusd to stop gracefully
      ansible.builtin.shell:
        cmd: "docker exec {{ running_container.stdout }} verus-cli stop 2>&1 || true"
      register: graceful_stop
      changed_when: true
      failed_when: false
      when: running_container.stdout | length > 0

    - name: Wait for verusd to finish shutdown
      ansible.builtin.pause:
        seconds: 15
      when: running_container.stdout | length > 0

    # 6. Stop container (extended timeout for I/O-bound flush)
    - name: Stop container
      ansible.builtin.shell:
        cmd: "timeout 90 docker stop -t 60 {{ running_container.stdout }} 2>&1 || true"
      register: docker_stop
      changed_when: true
      failed_when: false
      when: running_container.stdout | length > 0

    - name: Confirm container stopped
      ansible.builtin.debug:
        msg: "Container stop result: {{ docker_stop.stdout | default('n/a') }}"

    # 7. Disconnect network (release IP allocation)
    - name: Disconnect container network
      ansible.builtin.shell:
        cmd: "docker network disconnect {{ pbaas_chain }}_blue {{ running_container.stdout }} 2>/dev/null || true"
      changed_when: false
      failed_when: false
      when: running_container.stdout | length > 0

    # 8. Ensure BOOTSTRAP_FLAG is cleared — clean shutdown means next start syncs from peers
    - name: Verify BOOTSTRAP_FLAG
      ansible.builtin.shell:
        cmd: "grep '^VERUSD_BOOTSTRAP_FLAG=' {{ chain_path }}/.env"
      register: bootstrap_line
      changed_when: false
      failed_when: false
      when: running_container.stdout | length > 0

    - name: Clear BOOTSTRAP_FLAG for clean shutdown
      ansible.builtin.lineinfile:
        path: "{{ chain_path }}/.env"
        regexp: '^VERUSD_BOOTSTRAP_FLAG=.*'
        line: "VERUSD_BOOTSTRAP_FLAG="
      when: running_container.stdout | length > 0 and bootstrap_line.stdout != 'VERUSD_BOOTSTRAP_FLAG='
      register: bootstrap_cleared

    - name: Confirm clean shutdown flag
      ansible.builtin.debug:
        msg: "{{ 'BOOTSTRAP_FLAG cleared — clean shutdown recorded' if bootstrap_cleared.changed else 'BOOTSTRAP_FLAG already empty' }}"
      when: bootstrap_cleared is defined
