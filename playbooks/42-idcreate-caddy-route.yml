# Playbook: 42-idcreate-caddy-route.yml
# Purpose: Add idcreate.vrsctest.buildwithdreams.com route to the existing Caddyfile
#          and reload Caddy. Proxies to 10.200.0.14:5003 inside net-vrsctest.
#          Caddy is already on net-vrsctest (added by qrcodes deployment, playbook 37).
# Run with: ansible-playbook -i inventory.ini playbooks/42-idcreate-caddy-route.yml
# Requires: 41-idcreate-deploy.yml (container running); 37-qrcodes-caddy-network.yml (Caddy on net-vrsctest)
# Idempotent: safe to re-run — route block present on subsequent runs.
---
- name: Add idcreate.vrsctest Caddy route
  hosts: production
  become: false
  vars:
    caddy_path: "/home/{{ ansible_user }}/caddy"
    caddy_container: "mains_blue_caddy-caddy-1"
    docker_network: "net-vrsctest"
    idcreate_bind_ip: "10.200.0.14"
    idcreate_api_port: "5003"
    idcreate_domain: "idcreate.vrsctest.buildwithdreams.com"

  tasks:
    # ── 0. Pre-flight: verify Caddy is on net-vrsctest ──────────────────────────
    - name: Verify Caddy is connected to net-vrsctest (pre-flight)
      ansible.builtin.shell:
        cmd: "docker network inspect {{ docker_network }} | grep -q '{{ caddy_container }}' && echo ok || echo missing"
      register: caddy_network_preflight
      changed_when: false
      failed_when: caddy_network_preflight.stdout != 'ok'

    # ── 1. Validate Caddyfile exists ────────────────────────────────────────────
    - name: Verify Caddyfile exists
      ansible.builtin.stat:
        path: "{{ caddy_path }}/Caddyfile"
      register: caddyfile_stat
      failed_when: not caddyfile_stat.stat.exists

    # ── 2. Check if route already exists ────────────────────────────────────────
    - name: Check if idcreate.vrsctest route already in Caddyfile
      ansible.builtin.shell:
        cmd: "grep -q '{{ idcreate_domain }}' {{ caddy_path }}/Caddyfile && echo 'present' || echo 'absent'"
      register: route_check
      changed_when: false
      failed_when: false

    - name: Display route status
      ansible.builtin.debug:
        msg: "idcreate.vrsctest route in Caddyfile: {{ route_check.stdout }}"

    # ── 3. Append route block if not present ────────────────────────────────────
    - name: Append idcreate.vrsctest route to Caddyfile
      ansible.builtin.blockinfile:
        path: "{{ caddy_path }}/Caddyfile"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — idcreate.vrsctest.buildwithdreams.com"
        content: |
          {{ idcreate_domain }} {
            reverse_proxy {{ idcreate_bind_ip }}:{{ idcreate_api_port }}
            tls hermesreport@verus.trading
            log {
              output file /data/access.log
            }
          }
      register: caddyfile_updated
      when: route_check.stdout == 'absent'

    - name: Display Caddyfile update result
      ansible.builtin.debug:
        msg: "Caddyfile updated — idcreate.vrsctest route block {{ 'added' if caddyfile_updated.changed else 'already present' }}"
      when: route_check.stdout == 'absent'

    # ── 4. Copy updated Caddyfile into container ───────────────────────────────
    # The blockinfile task wrote to the host path; copy it into the read-only container mount
    - name: Copy formatted Caddyfile into container
      ansible.builtin.shell:
        cmd: "docker cp {{ caddy_path }}/Caddyfile {{ caddy_container }}:/config/caddy/Caddyfile"
      register: caddy_copy
      changed_when: true
      when: route_check.stdout == 'absent'

    # ── 5. Verify Caddyfile is valid before reload ─────────────────────────────
    - name: Validate Caddyfile syntax
      ansible.builtin.shell:
        cmd: "docker exec {{ caddy_container }} caddy validate --config /config/caddy/Caddyfile 2>&1"
      register: caddy_validate
      failed_when: false
      changed_when: false
      when: caddy_copy.changed

    - name: Abort if Caddyfile invalid
      ansible.builtin.fail:
        msg: "Caddyfile is invalid — not reloading. Output: {{ caddy_validate.stdout_lines | join(' ') }}"
      when: caddy_copy.changed and caddy_validate.rc != 0

    # ── 6. Reload Caddy (only when route was added) ─────────────────────────────
    - name: Reload Caddy to apply new route
      ansible.builtin.shell:
        cmd: "docker exec {{ caddy_container }} caddy reload --config /config/caddy/Caddyfile 2>&1"
      register: caddy_reload
      failed_when: false
      when: caddy_copy.changed

    - name: Display reload result
      ansible.builtin.debug:
        msg: "Caddy reloaded: {{ caddy_reload.stdout_lines | join(' ') if caddy_reload.stdout else caddy_reload.stderr_lines | join(' ') }}"
      when: caddy_copy.changed

    # ── 7. Health check: verify upstream is reachable from Caddy ────────────────
    - name: Health check — upstream idcreate API
      ansible.builtin.shell:
        cmd: "docker exec {{ caddy_container }} wget -q -O - --timeout=5 http://{{ idcreate_bind_ip }}:{{ idcreate_api_port }}/health 2>&1 | head -1 || echo 'unreachable'"
      register: upstream_health
      changed_when: false
      failed_when: false
      when: caddy_copy.changed

    - name: Warn if upstream unreachable
      ansible.builtin.debug:
        msg: "WARNING: Upstream at {{ idcreate_bind_ip }}:{{ idcreate_api_port }} did not respond. Route is configured but app may be down."
      when: caddy_copy.changed and upstream_health.stdout == 'unreachable'

    # ── 8. Summary ──────────────────────────────────────────────────────────────
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          svc-idcreate (VRSCTEST) Caddy route added:
            URL      → https://{{ idcreate_domain }}
            Upstream → {{ idcreate_bind_ip }}:{{ idcreate_api_port }}
            TLS      → hermesreport@verus.trading (manual)
            Route    → reverse_proxy (no path rewrite)

          Verify:
            curl -I https://{{ idcreate_domain }}
