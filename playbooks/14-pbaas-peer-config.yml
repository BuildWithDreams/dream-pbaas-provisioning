# Playbook: 14-pbaas-peer-config.yml
# Purpose: Add explicit peer connect entries to a PBaaS chain's .conf file.
#          Idempotent — only adds peers that are not already configured.
#
# ⚠️  Run from the CONTROL NODE — this playbook manages the remote BWD node.
#    The provisioning repo lives on the control node, NOT on the remote.
#
# Run with:
#   ansible-playbook -i inventory.ini playbooks/14-pbaas-peer-config.yml \
#     -e pbaas_chain=varrr \
#     -e "peers=[{host: '142.44.215.100', port: 20777}, {host: '162.55.5.83', port: 20777}]"
#
# Required vars:
#   pbaas_chain  — chain name: varrr, vdex, or chips
#   peers        — list of {host, port} dicts. Must be provided via -e as JSON:
#                   -e '{"peers": [{host: "1.2.3.4", port: 20777}]}'

---
- name: Configure PBaaS chain peer connections
  hosts: production
  become: false

  vars:
    pbaas_chain_info:
      varrr:
        subdir: pbaas/varrr
        hex: e9e10955b7d16031e3d6f55d9c908a038e3ae47d
      vdex:
        subdir: pbaas/vdex
        hex: 53fe39eea8c06bba32f1a4e20db67e5524f0309d
      chips:
        subdir: pbaas/chips
        hex: f315367528394674d45277e369629605a1c3ce9f

  tasks:
    - name: Validate pbaas_chain is known
      ansible.builtin.assert:
        that:
          - pbaas_chain in pbaas_chain_info
        fail_msg: "Unknown pbaas_chain: '{{ pbaas_chain }}'. Must be one of: varrr, vdex, chips."
        success_msg: "pbaas_chain '{{ pbaas_chain }}' validated"

    - name: Validate peers is a list
      ansible.builtin.assert:
        that:
          - peers is iterable
          - peers | length > 0
        fail_msg: >-
          No peers provided. Provide via:
          -e "peers=[{host: '142.44.215.100', port: 20777}, ...]"

    - name: Set chain paths
      ansible.builtin.set_fact:
        chain_subdir: "{{ pbaas_chain_info[pbaas_chain].subdir }}"
        currencyid_hex: "{{ pbaas_chain_info[pbaas_chain].hex }}"

    - name: Set conf file path
      ansible.builtin.set_fact:
        conf_file: "/home/{{ ansible_user }}/docker-verusd/{{ chain_subdir }}/data_dir/{{ currencyid_hex }}.conf"

    - name: Check conf file exists
      ansible.builtin.shell:
        cmd: "test -f {{ conf_file }} && echo present || echo missing"
      register: conf_check
      changed_when: false

    - name: Fail if conf file is missing
      ansible.builtin.fail:
        msg: |
          Conf file not found: {{ conf_file }}
          Run playbook 11-setup-pbaas.yml first to generate the chain config.
      when: conf_check.stdout != "present"

    - name: Read current conf file contents
      ansible.builtin.slurp:
        src: "{{ conf_file }}"
      register: conf_contents_b64

    - name: Decode conf file
      ansible.builtin.set_fact:
        conf_content: "{{ conf_contents_b64.content | b64decode }}"

    - name: Display current peer-related lines
      ansible.builtin.debug:
        msg: |
          Existing connect/whitelist/addnode lines in {{ conf_file }}:
          {{ conf_content.splitlines() | select('search', '^(connect|whitelist|addnode)=') | list | join('\n') or '(none)' }}

    - name: Add connect= for each peer (idempotent)
      ansible.builtin.lineinfile:
        path: "{{ conf_file }}"
        line: "connect={{ item.host }}"
        regexp: "^connect={{ item.host }}$"
        state: present
      loop: "{{ peers }}"
      register: peer_lines

    - name: Display changes made
      ansible.builtin.debug:
        msg: |
          Peer configuration applied to {{ conf_file }}:
          {% for entry in peer_lines.results %}
          {%   if entry.get('changed') %}
          + {{ entry.get('line', '?') }}
          {%   else %}
          = {{ entry.get('line', '?') }} (already present)
          {%   endif %}
          {% endfor %}

    - name: Restart container to pick up new peer config
      ansible.builtin.shell:
        cmd: "cd /home/{{ lookup('env', 'USER') }}/docker-verusd/{{ chain_subdir }} && docker compose -p {{ pbaas_chain }}_blue restart"
      register: restart_result
      changed_when: restart_result.rc == 0

    - name: Wait for container to be healthy
      ansible.builtin.pause:
        seconds: 15
      changed_when: false

    - name: Verify container is running
      ansible.builtin.shell:
        cmd: "docker ps --filter name={{ pbaas_chain }}_blue-{{ pbaas_chain }}-1 --format \"{{{{.Names}}}}\" 2>/dev/null | grep -q . && echo running || echo stopped"
      register: container_check
      changed_when: false

    - name: Confirm restart
      ansible.builtin.debug:
        msg: |
          ✅ Container restart {{ 'succeeded' if 'running' in container_check.stdout else 'FAILED — check manually' }}
          Container: {{ pbaas_chain }}_blue-{{ pbaas_chain }}-1
          Peer config written to: {{ conf_file }}
