# Playbook: 41-qrcodes-qrdev-build.yml
# Purpose: Build the qrdev Docker image for VRSCTEST.
#          Tagged as buildwithdreams/verus-qr-creator:qrdev.
# Run with: ansible-playbook -i inventory.ini playbooks/41-qrcodes-qrdev-build.yml
#           -e qrcodes_qrdev_rebuild=true   (force clean build, bypass cache)
# Idempotent: skips if image exists and qrcodes_qrdev_rebuild!=true.
# Requires: 39-qrcodes-qrdev-clone.yml (repo must be cloned)
#           AND 40-qrcodes-qrdev-configure.yml (config.js must exist — baked into image)
---
- name: Build qrdev Docker image for VRSCTEST
  hosts: production
  become: false
  vars:
    qr_repo_dest: "verus-identity-update-qr-creator-dev"
    qr_path: "/home/{{ ansible_user }}/{{ qr_repo_dest }}"
    image_name: "buildwithdreams/verus-qr-creator"
    image_tag: "qrdev"
    dockerfile_path: "{{ qr_path }}/Dockerfile"

  tasks:
    # ── 1. Verify repo is cloned ────────────────────────────────────────────────
    - name: Verify qrcode repository exists
      ansible.builtin.stat:
        path: "{{ qr_path }}"
      register: qr_dir_stat
      failed_when: not qr_dir_stat.stat.exists

    - name: Verify Dockerfile exists
      ansible.builtin.stat:
        path: "{{ dockerfile_path }}"
      register: dockerfile_stat
      failed_when: not dockerfile_stat.stat.exists

    # ── 2. Check if image already exists ────────────────────────────────────────
    - name: Check if image already exists
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:{{ image_tag }} > /dev/null 2>&1 && echo 'exists' || echo 'missing'"
      register: image_check
      changed_when: false
      failed_when: false

    - name: Display build plan
      ansible.builtin.debug:
        msg: >
          Image {{ image_name }}:{{ image_tag }} — {{ image_check.stdout }}.
          {{ 'Will rebuild (qrcodes_qrdev_rebuild=true).' if qrcodes_qrdev_rebuild|d(false) | bool else 'Will skip (use -e qrcodes_qrdev_rebuild=true to force rebuild).' if image_check.stdout == 'exists' else 'Will build.' }}

    # ── 3. Build Docker image ────────────────────────────────────────────────────
    - name: Build Docker image (no cache)
      ansible.builtin.shell:
        cmd: >
          docker build
          --no-cache
          --tag {{ image_name }}:{{ image_tag }}
          --file {{ dockerfile_path }}
          {{ qr_path }}
      register: build_result
      changed_when: true
      when: qrcodes_qrdev_rebuild|d(false) | bool or image_check.stdout != 'exists'

    - name: Display build result
      ansible.builtin.debug:
        msg: "Docker image {{ image_name }}:{{ image_tag }} built successfully"
      when: qrcodes_qrdev_rebuild|d(false) | bool or image_check.stdout != 'exists'

    # ── 4. Verify image exists after build ──────────────────────────────────────
    - name: Verify image exists after build
      ansible.builtin.shell:
        cmd: "docker image inspect {{ image_name }}:{{ image_tag }} > /dev/null 2>&1 && echo 'ok' || echo 'missing'"
      register: final_image_check
      changed_when: false
      failed_when: final_image_check.stdout != 'ok'
      when: qrcodes_qrdev_rebuild|d(false) | bool or image_check.stdout != 'exists'

    # ── 5. Summary ───────────────────────────────────────────────────────────────
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          qrdev image built:
            image  → {{ image_name }}:{{ image_tag }}
            source → {{ qr_path }}/Dockerfile
            ⚠ Force rebuild with: -e qrcodes_qrdev_rebuild=true
            Source repo: imylomylo/verus-identity-update-qr-creator-main
