# Playbook: 09-hygiene.yml
# Purpose: Post-shutdown hygiene check — verify chain sync state, flip BOOTSTRAP_FLAG off
# Run after: daemon has been running and is now stopped gracefully
#
# Uses RPC getinfo to check:
#   - blocks == longestchain → fully synced, no fork → safe to disable bootstrap
#   - blocks != longestchain → fork detected → leave bootstrap on, report fork
#   - Daemon unreachable / RPC error → cannot confirm health → leave bootstrap on
#
# This is NOT part of the normal startup flow — it is a manual/scheduled hygiene step
# to transition a node from bootstrap mode to normal peer-sync after a successful run.
#
# Idempotent: safe to run as a cron job every hour.
# Once BOOTSTRAP_FLAG= is set, subsequent runs report no changes.
#
# Run with: ansible-playbook -i inventory.ini playbooks/09-hygiene.yml

---
- name: VRSC hygiene check
  hosts: production
  become: false
  vars:
    mainnet_path: "/home/{{ ansible_user }}/docker-verusd/mainnet"
    # Fallback list — tries in order until a running container is found
    # When COMPOSE_PROJECT_NAME=mains_blue is applied, use mains_blue-vrsc-1
    container_candidates:
      - "mains_blue-vrsc-1"
      - "pbaas_mainnets-vrsc-1"

  tasks:
    # 1. Find the active VRSC container (first match that is running)
    - name: Detect running VRSC container
      ansible.builtin.shell: |
        for c in {{ container_candidates | map('quote') | join(' ') }}; do
          if docker ps --format '{{' '{{' }}.Names{{ '}' }}{{' }}' | grep -q "^$c$"; then
            echo "$c"
            exit 0
          fi
        done
      register: container_detect
      changed_when: false
      failed_when: false

    - name: Set container name
      ansible.builtin.set_fact:
        container_name: "{{ container_detect.stdout | trim }}"

    # 2. Check RPC getinfo for chain sync and fork status
    - name: Get chain sync status via RPC
      ansible.builtin.shell: |
        docker exec {{ container_name }} verus getinfo 2>/dev/null || echo '{}'
      register: getinfo_raw
      changed_when: false
      failed_when: false

    - name: Parse getinfo
      ansible.builtin.set_fact:
        getinfo_parsed: "{{ getinfo_raw.stdout | from_json if getinfo_raw.stdout | length > 0 else {} }}"

    - name: Extract sync and fork data
      ansible.builtin.set_fact:
        blocks: "{{ getinfo_parsed.blocks | default(0) }}"
        longestchain: "{{ getinfo_parsed.longestchain | default(0) }}"
        fork_detected: "{{ getinfo_parsed.blocks | default(0) != getinfo_parsed.longestchain | default(0) }}"
        rpc_available: "{{ getinfo_raw.stdout | length > 0 }}"

    - name: Display chain status
      ansible.builtin.debug:
        msg: |
          RPC available: {{ rpc_available }}
          blocks: {{ blocks }}
          longestchain: {{ longestchain }}
          fork_detected: {{ fork_detected }}
          synced (blocks == longestchain): {{ not fork_detected }}

    # 4. Flip BOOTSTRAP_FLAG off if chain is synced and no fork detected
    - name: Confirm hygiene — disable bootstrap
      when: rpc_available and not fork_detected
      block:
        - name: Disable bootstrap flag
          ansible.builtin.lineinfile:
            path: "{{ mainnet_path }}/.env"
            regexp: '^VERUSD_BOOTSTRAP_FLAG='
            line: "VERUSD_BOOTSTRAP_FLAG="
            state: present

        - name: Read .env
          ansible.builtin.shell:
            cmd: "cat {{ mainnet_path }}/.env"
          changed_when: false
          register: final_env

        - name: Display success
          ansible.builtin.debug:
            msg: |
              HYGIENE CHECK PASSED
              Chain fully synced (blocks == longestchain), no fork detected.
              BOOTSTRAP_FLAG set to empty — safe to sync from peers.
              .env contents:
              {{ final_env.stdout }}
      rescue:
        - name: Display failure
          ansible.builtin.debug:
            msg: "Failed to update .env — check permissions"

    # 5. Report fork or RPC failure — leave bootstrap on
    - name: Report fork or RPC failure
      when: not (rpc_available and not fork_detected)
      ansible.builtin.debug:
        msg: |
          HYGIENE CHECK FAILED
          {{ 'Fork detected (blocks != longestchain)' if rpc_available and fork_detected else 'RPC unavailable — daemon may not be running' }}.
          BOOTSTRAP_FLAG left unchanged (-bootstrap).
          Resolve the issue before running hygiene check again.
