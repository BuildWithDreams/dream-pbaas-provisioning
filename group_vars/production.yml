# ⚠️ EDIT THESE VALUES FOR YOUR DEPLOYMENT
# All secrets and target-specific values are centralized here

---
# Production group variables
env: production
ansible_become: true
ansible_become_method: sudo

# Target host IP
target_host: 135.181.136.105

# SSH connection
ansible_user: dream-hermes-agent
ansible_ssh_private_key_file: ~/.ssh/dream-hermes-agent_id_25519
ansible_ssh_common_args: -o StrictHostKeyChecking=no
ansible_python_interpreter: /usr/bin/python3

# Users to add to the docker group
docker_users:
  - dream-hermes-agent

# Repository clone destinations (relative to ansible_user home)
clone_destinations:
  docker_verusd: docker-verusd

# Docker network definitions
# Each network gets its own subnet with readable bridge name
# IP convention per service: .11=verusd, .12=RPC, .13=explorer, .14=ID verify
# Subnet: use any private range (e.g. 10.x.x.x/24, 192.168.x.x/24)
# Bridge name: SP + first3octets .1 with dots removed (e.g. 10.201.0.0/24 → SP1020101)
#
# ⚠️ DO NOT EDIT verus_networks HERE — edit env.sample files in docker-verusd repo,
#    then run playbooks/02-generate-env-files.yml to regenerate group_vars/generated_networks.yml
verus_networks:
  - name: net-vrsc-blue
    subnet: 10.201.0.0/24
    bridge_suffix: SP1020101
